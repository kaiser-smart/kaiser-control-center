name = "kaiser-receivables-kb-payment-runner"
main = "workers/receivables-kb-payment-runner.js"
compatibility_date = "2026-07-22"
workers_dev = false

[vars]
KB_ADAA_ENVIRONMENT = "production"
KB_ADAA_PAYMENT_SYNC_ENABLED = "true"
KB_ADAA_INITIAL_LOOKBACK_DAYS = "90"
KB_ADAA_OVERLAP_DAYS = "7"

[[d1_databases]]
binding = "SMART_ODPADY_DB"
database_name = "smart-odpady"
database_id = "6d9ab099-fa10-4245-b06b-e146b63450a9"

[triggers]
crons = ["7 */2 * * *"]
