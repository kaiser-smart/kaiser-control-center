<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{email_title}}</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>

<body style="margin:0; padding:0; background:#f7f9f4; font-family:'Quicksand', Arial, Helvetica, sans-serif; color:#1f2921;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; background:#f7f9f4;">
    <tr>
      <td align="center" style="padding:54px 18px;">

        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:640px; background:#ffffff; border:1px solid #e1e6de; border-radius:16px; box-shadow:0 28px 70px rgba(31,41,33,0.16); overflow:hidden;">
          <tr>
            <td style="padding:48px 48px 50px 48px;">

              <table role="presentation" cellspacing="0" cellpadding="0" border="0" style="margin:0 0 42px 0;">
                <tr>
                  <td style="background:#75bd25; border-radius:14px; padding:13px 26px; box-shadow:inset 0 1px 0 rgba(255,255,255,0.35), 0 2px 5px rgba(117,189,37,0.28);">
                    <span style="display:block; font-family:'Quicksand', Arial, Helvetica, sans-serif; font-size:30px; line-height:34px; font-weight:700; color:#ffffff; letter-spacing:-0.6px;">
                      kaiser.
                    </span>
                  </td>
                </tr>
              </table>

              <h1 style="margin:0 0 12px 0; font-family:'Quicksand', Arial, Helvetica, sans-serif; font-size:52px; line-height:58px; font-weight:800; letter-spacing:-1.8px; color:#1f2921;">
                {{headline}}
              </h1>

              <p style="margin:0 0 44px 0; font-family:'Quicksand', Arial, Helvetica, sans-serif; font-size:23px; line-height:31px; font-weight:700; color:#6b776a;">
                {{subtitle}}
              </p>

              <p style="margin:0 0 12px 0; font-family:'Quicksand', Arial, Helvetica, sans-serif; font-size:20px; line-height:26px; font-weight:700; color:#3f4a45;">
                {{main_label}}
              </p>

              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; margin:0 0 26px 0;">
                <tr>
                  <td align="center" style="background:#f7fbf2; border:1px solid #d8e2d3; border-radius:14px; padding:22px 18px;">
                    <div style="font-family:'Quicksand', Arial, Helvetica, sans-serif; font-size:42px; line-height:50px; font-weight:800; letter-spacing:8px; color:#1f2921;">
                      {{main_content}}
                    </div>
                  </td>
                </tr>
              </table>

              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; margin:0 0 28px 0;">
                <tr>
                  <td align="center" style="background:#75bd25; border-radius:14px; padding:20px 24px;">
                    <p style="margin:0; font-family:'Quicksand', Arial, Helvetica, sans-serif; font-size:20px; line-height:28px; font-weight:700; color:#ffffff;">
                      {{cta_text}}
                    </p>
                  </td>
                </tr>
              </table>

              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%;">
                <tr>
                  <td style="background:#f5f7f2; border-radius:14px; padding:18px 20px;">
                    <p style="margin:0; font-family:'Quicksand', Arial, Helvetica, sans-serif; font-size:15px; line-height:23px; font-weight:500; color:#667064;">
                      {{info_text}}
                    </p>
                  </td>
                </tr>
              </table>

              <p style="margin:34px 0 0 0; font-family:'Quicksand', Arial, Helvetica, sans-serif; font-size:13px; line-height:20px; font-weight:500; color:#8a9388;">
                {{footer_text}}
              </p>

            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>
</body>
</html>
